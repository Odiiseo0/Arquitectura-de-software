<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero">
        <div class="overlay">
            <h1>Store</h1>
            <p>Los mejores sabores y promociones</p>
            <a href="https://wa.me/5218112345678" class="btn">
                Pedir por WhatsApp
            </a>
        </div>
    </header>

    <section class="about">
        <h2>Sobre Nosotros</h2>
        <p>
            Encuentra una gran variedad de vapes y sabores con entrega rápida.
        </p>
    </section>

    <section class="products">
        <h2>Productos Destacados</h2>

        <div class="grid">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600" alt="">
                <h3>Blue Razz Ice</h3>
                <p>$250 MXN</p>
                <button onclick="pedir('Blue Razz Ice')">Pedir</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600" alt="">
                <h3>Mango Peach</h3>
                <p>$280 MXN</p>
                <button onclick="pedir('Mango Peach')">Pedir</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600" alt="">
                <h3>Watermelon Ice</h3>
                <p>$270 MXN</p>
                <button onclick="pedir('Watermelon Ice')">Pedir</button>
            </div>

        </div>
    </section>

    <footer>
        <p>© 2026 Store</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
